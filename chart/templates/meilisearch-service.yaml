apiVersion: v1
kind: Service
metadata:
  name: goodtribes-meilisearch
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "goodtribes.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "goodtribes.selectorLabels" "meilisearch" | nindent 4 }}
  ports:
    - port: {{ .Values.meilisearch.service.port }}
      targetPort: {{ .Values.meilisearch.service.port }}
