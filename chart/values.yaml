namespace: goodtribes

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/goodtribes-org/goodtribes.org/frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 3000
  env:
    NEXT_PUBLIC_STRAPI_URL: http://goodtribes-backend:1337
    NEXT_PUBLIC_MEILI_HOST: http://goodtribes-meilisearch:7700
    S3_ENDPOINT: http://goodtribes-minio:9000
    S3_PUBLIC_BUCKET: goodtribes-public
    S3_PRIVATE_BUCKET: goodtribes-private
    NEXT_PUBLIC_STORAGE_URL: https://goodtribes.org/storage
  # Sensitive vars from goodtribes-secret:
  #   AUTH_SECRET
  #   RESEND_API_KEY
  #   DATABASE_URL          (postgresql://goodtribes:<password>@goodtribes-postgres:5432/goodtribes)
  #   REDIS_URL             (redis://:<password>@goodtribes-redis:6379)
  #   STRAPI_API_TOKEN
  #   NEXT_PUBLIC_MEILI_SEARCH_KEY
  #   S3_ACCESS_KEY         (MinIO root user / S3 access key)
  #   S3_SECRET_KEY         (MinIO root password / S3 secret key)
  #   STRIPE_SECRET_KEY
  #   STRIPE_WEBHOOK_SECRET
  #   NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY   (not actually secret, but Next.js inlines NEXT_PUBLIC_*
  #                                         vars at *build* time — a runtime envFrom secretRef here
  #                                         does nothing for the client bundle. It's wired as a
  #                                         Docker build ARG in .github/workflows/docker-image.yml
  #                                         instead; this entry is just tracking that the value
  #                                         itself still needs to exist somewhere, e.g. a repo secret)

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/goodtribes-org/goodtribes.org/backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 1337
  env:
    HOST: "0.0.0.0"
    PORT: "1337"
    DATABASE_CLIENT: postgres
    DATABASE_HOST: goodtribes-postgres
    DATABASE_PORT: "5432"
    DATABASE_NAME: goodtribes
    DATABASE_USERNAME: goodtribes
    DATABASE_SSL: "false"
    MEILI_HOST: http://goodtribes-meilisearch:7700
  # Sensitive vars from goodtribes-secret:
  #   APP_KEYS
  #   API_TOKEN_SALT
  #   ADMIN_JWT_SECRET
  #   TRANSFER_TOKEN_SALT
  #   JWT_SECRET
  #   ENCRYPTION_KEY
  #   DATABASE_PASSWORD
  #   MEILI_MASTER_KEY

postgres:
  replicaCount: 1
  image:
    repository: postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
  service:
    port: 5432
  env:
    POSTGRES_USER: goodtribes
    POSTGRES_DB: goodtribes
  persistence:
    size: 5Gi
    storageClass: ""
  # Sensitive vars from goodtribes-secret:
  #   POSTGRES_PASSWORD

meilisearch:
  replicaCount: 1
  image:
    repository: getmeili/meilisearch
    tag: v1.6
    pullPolicy: IfNotPresent
  service:
    port: 7700
  env:
    MEILI_ENV: production
  persistence:
    size: 5Gi
    storageClass: ""
  # Sensitive vars from goodtribes-secret:
  #   MEILI_MASTER_KEY

redis:
  replicaCount: 1
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  service:
    port: 6379
  env: {}
  # No persistence block: Redis here is a pure pub/sub bus + TTL'd presence
  # cache, not a durable store. Postgres remains the sole durable message
  # history; SSE reconnect catch-up reads from Postgres, never Redis.
  # Sensitive vars from goodtribes-secret:
  #   REDIS_PASSWORD

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: http
    acme.cert-manager.io/http01-edit-in-place: "true"
    kubernetes.io/ingress.class: traefik
    kubernetes.io/tls-acme: "true"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure,web
  hosts:
    - goodtribes.org
    - www.goodtribes.org
  tls:
    - secretName: goodtribes-tls
      hosts:
        - goodtribes.org
        - www.goodtribes.org

minio:
  replicaCount: 1
  image:
    repository: minio/minio
    tag: latest
    pullPolicy: IfNotPresent
  service:
    apiPort: 9000
    consolePort: 9001
  env: {}
  persistence:
    size: 20Gi
    storageClass: ""
  # Sensitive vars from goodtribes-secret:
  #   MINIO_ROOT_USER       (same value as S3_ACCESS_KEY)
  #   MINIO_ROOT_PASSWORD   (same value as S3_SECRET_KEY)

imagePullSecrets:
  - name: ghcr-pull-secret

ghcrPullSecretData: ""
