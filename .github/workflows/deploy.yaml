name: Deploy To Production

on:
  workflow_run:
    workflows: [Docker Publish]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check out Manifest
        uses: actions/checkout@v4
        with:
          repository: goodtribes-org/deploy
          ref: main
          path: manifest
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Deploy
        uses: WyriHaximus/github-action-helm3@v3
        with:
          exec: |
            if [ ! -d "chart" ]; then
              echo "::error::Chart directory not found"
              exit 1
            fi
            helm template chart/ \
              --set frontend.image.tag=${{ github.event.workflow_run.head_sha }} \
              --set backend.image.tag=${{ github.event.workflow_run.head_sha }} \
              --set-string ghcrPullSecretData=${{ secrets.GHCR_PULL_SECRET }} \
              > manifest/goodtribes/goodtribes.yaml
            cat manifest/goodtribes/goodtribes.yaml

      - name: GIT commit and push all changed files
        env:
          CI_COMMIT_MESSAGE: Continuous Integration Build Artifacts
          CI_COMMIT_AUTHOR: Continuous Integration
        run: |
          cd manifest
          git config --global user.name "${{ env.CI_COMMIT_AUTHOR }}"
          git config --global user.email "username@users.noreply.github.com"
          git add goodtribes/goodtribes.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "${{ env.CI_COMMIT_MESSAGE }}"
          git push

      - name: Apply to cluster
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
        run: |
          if [ -z "$KUBECONFIG_DATA" ]; then
            echo "KUBECONFIG_DATA not set — skipping direct kubectl deploy"
            exit 0
          fi
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl apply -f manifest/goodtribes/goodtribes.yaml
          kubectl rollout status deployment/goodtribes-frontend -n goodtribes --timeout=120s

